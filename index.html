<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PROJECT ARENA — 공식 다운로드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=Barlow+Semi+Condensed:wght@500;600&display=swap" rel="stylesheet">
<style>
  /* =================================================================
     PROJECT_ARENA 다운로드 포털
     -----------------------------------------------------------------
     ★ 설정은 아래 <script> 맨 위 CONFIG 한 곳만 바꾸면 됩니다.
     ================================================================= */

  :root{
    --bg-deep:    #010A13;   /* 가장 어두운 배경 */
    --bg-panel:   #091428;   /* 패널 배경 */
    --bg-panel-2: #0A1A2F;
    --gold:       #C89B3C;   /* 헥스텍 골드 */
    --gold-bright:#F0E6D2;   /* 밝은 양피지색 텍스트 */
    --gold-dark:  #785A28;   /* 어두운 골드 (테두리) */
    --teal:       #0AC8B9;   /* 헥스텍 청록 */
    --teal-dark:  #0397AB;
    --grey:       #A09B8C;   /* 보조 텍스트 */
    --grey-dim:   #5B5A56;
    --line:       #1E2328;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior:smooth; }

  body{
    background:var(--bg-deep);
    color:var(--gold-bright);
    font-family:'Noto Sans KR', sans-serif;
    line-height:1.6;
    overflow-x:hidden;
  }

  /* 배경 시네마틱 글로우 */
  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      radial-gradient(900px 600px at 50% -10%, rgba(10,200,185,0.10), transparent 60%),
      radial-gradient(1200px 800px at 50% 30%, rgba(200,155,60,0.06), transparent 55%),
      var(--bg-deep);
    z-index:-2;
  }
  /* 미세한 헥스 격자 */
  body::after{
    content:"";
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(200,155,60,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,155,60,0.03) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image:radial-gradient(circle at 50% 35%, black, transparent 75%);
    z-index:-1;
  }

  .wrap{ max-width:1160px; margin:0 auto; padding:0 24px; }

  /* ============================ NAV ============================ */
  nav{
    position:sticky; top:0; z-index:50;
    background:linear-gradient(180deg, rgba(1,10,19,0.96), rgba(1,10,19,0.78));
    border-bottom:1px solid var(--gold-dark);
    backdrop-filter:blur(8px);
  }
  .nav-inner{
    max-width:1160px; margin:0 auto; padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:20px;
  }
  .brand{
    font-family:'Cinzel', serif; font-weight:900;
    font-size:20px; letter-spacing:3px; color:var(--gold-bright);
    text-decoration:none; white-space:nowrap;
  }
  .brand span{ color:var(--gold); }
  .nav-links{ display:flex; gap:28px; align-items:center; }
  .nav-links a{
    color:var(--grey); text-decoration:none;
    font-family:'Barlow Semi Condensed', sans-serif;
    text-transform:uppercase; letter-spacing:1.5px; font-size:14px;
    transition:color .2s;
  }
  .nav-links a:hover{ color:var(--gold-bright); }

  /* ============================ HERO ============================ */
  header.hero{
    min-height:calc(100vh - 57px);
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:80px 24px;
    position:relative;
  }
  .ver-badge{
    display:inline-flex; align-items:center; gap:10px;
    border:1px solid var(--gold-dark);
    padding:7px 16px; margin-bottom:30px;
    font-family:'Barlow Semi Condensed', sans-serif;
    letter-spacing:2px; font-size:13px; text-transform:uppercase;
    color:var(--gold); background:rgba(200,155,60,0.04);
  }
  .ver-badge .dot{
    width:7px; height:7px; border-radius:50%; background:var(--teal);
    box-shadow:0 0 10px var(--teal);
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{ 50%{ opacity:.35; } }

  .hero h1{
    font-family:'Cinzel', serif; font-weight:900;
    font-size:clamp(48px, 9vw, 104px);
    line-height:.98; letter-spacing:2px;
    color:var(--gold-bright);
    text-shadow:0 0 60px rgba(10,200,185,0.25);
  }
  .hero h1 .accent{ color:var(--gold); }
  .hero .tagline{
    margin:22px auto 0; max-width:560px;
    color:var(--grey); font-weight:300; font-size:clamp(15px,2.2vw,18px);
    letter-spacing:.5px;
  }

  /* 다운로드 카드 (시그니처: 헥스텍 각진 프레임) */
  .dl-card{
    margin:46px auto 0; max-width:560px;
    position:relative; padding:2px;
    background:linear-gradient(135deg, var(--gold), var(--gold-dark) 60%, var(--gold));
    clip-path:polygon(0 14px,14px 0,calc(100% - 14px) 0,100% 14px,100% calc(100% - 14px),calc(100% - 14px) 100%,14px 100%,0 calc(100% - 14px));
  }
  .dl-card-inner{
    background:linear-gradient(180deg, var(--bg-panel-2), var(--bg-panel));
    clip-path:polygon(0 13px,13px 0,calc(100% - 13px) 0,100% 13px,100% calc(100% - 13px),calc(100% - 13px) 100%,13px 100%,0 calc(100% - 13px));
    padding:34px 30px;
  }
  .dl-meta{
    display:flex; justify-content:center; gap:26px; flex-wrap:wrap;
    margin-bottom:24px; font-family:'Barlow Semi Condensed', sans-serif;
    font-size:13px; letter-spacing:1px; text-transform:uppercase;
  }
  .dl-meta .k{ color:var(--grey-dim); display:block; margin-bottom:2px; }
  .dl-meta .v{ color:var(--gold-bright); font-size:15px; }

  /* 헥스텍 다운로드 버튼 */
  .btn-dl{
    display:block; width:100%; cursor:pointer;
    border:2px solid var(--gold); background:transparent;
    color:var(--gold); text-decoration:none;
    font-family:'Cinzel', serif; font-weight:700;
    font-size:20px; letter-spacing:3px; text-transform:uppercase;
    padding:18px; position:relative; overflow:hidden;
    transition:color .25s;
  }
  .btn-dl::before{
    content:""; position:absolute; inset:0;
    background:linear-gradient(90deg, var(--gold-dark), var(--gold));
    transform:translateX(-101%); transition:transform .3s ease;
    z-index:0;
  }
  .btn-dl span{ position:relative; z-index:1; }
  .btn-dl:hover{ color:var(--bg-deep); }
  .btn-dl:hover::before{ transform:translateX(0); }
  .btn-dl:focus-visible{ outline:3px solid var(--teal); outline-offset:3px; }
  .btn-dl[aria-disabled="true"]{
    border-color:var(--grey-dim); color:var(--grey-dim);
    cursor:not-allowed; pointer-events:none;
  }
  .dl-sub{ margin-top:14px; font-size:12.5px; color:var(--grey-dim); letter-spacing:.5px; }

  /* ====================== FOOTER ====================== */
  footer{
    border-top:1px solid var(--gold-dark);
    padding:40px 0; text-align:center; color:var(--grey-dim);
    font-size:13px; letter-spacing:.5px;
  }
  footer .fb{ font-family:'Cinzel', serif; letter-spacing:3px; color:var(--grey); margin-bottom:8px; }

  /* 진입 애니메이션 */
  .fade-up{ opacity:0; transform:translateY(24px); animation:fadeUp .8s ease forwards; }
  .d1{ animation-delay:.05s; } .d2{ animation-delay:.18s; }
  .d3{ animation-delay:.32s; } .d4{ animation-delay:.46s; }
  @keyframes fadeUp{ to{ opacity:1; transform:translateY(0); } }

  @media (max-width:720px){
    .nav-links{ gap:16px; }
    .nav-links a{ font-size:12px; }
  }
  @media (prefers-reduced-motion:reduce){
    *{ animation:none !important; transition:none !important; }
    .fade-up{ opacity:1; transform:none; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="#" class="brand">PROJECT <span>ARENA</span></a>
    <div class="nav-links">
      <a href="#download">다운로드</a>
    </div>
  </div>
</nav>

<header class="hero" id="download">
  <div class="wrap">
    <div class="ver-badge fade-up d1">
      <span class="dot"></span>
      <span id="badgeText">최신 버전 확인 중…</span>
    </div>

    <h1 class="fade-up d1">PROJECT <span class="accent">ARENA</span></h1>
    <p class="tagline fade-up d2">3 대 3 탑다운 아레나 — 전장의 지배자가 되어라.</p>

    <div class="dl-card fade-up d3">
      <div class="dl-card-inner">
        <div class="dl-meta">
          <div><span class="k">버전</span><span class="v" id="metaVer">—</span></div>
          <div><span class="k">용량</span><span class="v" id="metaSize">—</span></div>
          <div><span class="k">업데이트</span><span class="v" id="metaDate">—</span></div>
        </div>
        <a class="btn-dl" id="dlBtn" href="#" aria-disabled="true"><span id="dlBtnText">불러오는 중…</span></a>
        <p class="dl-sub" id="dlSub">Windows 10 / 11 (64-bit)</p>
      </div>
    </div>
  </div>
</header>

<footer>
  <div class="fb">PROJECT ARENA</div>
  <div>제작: DEGUL</div>
</footer>

<script>
/* =====================================================================
   ★★★ 여기만 바꾸면 됩니다 ★★★
   ===================================================================== */
const CONFIG = {
  // GitHub 사용자명과 저장소 이름
  githubOwner: "sci800",
    githubRepo:  "PROJECT_ARENA_SITE",

  // GitHub를 안 쓰고 직접 링크로 배포할 거면 useGithub를 false로,
  // 아래 manual 값을 채우세요.
  useGithub: true,
  manual: {
    version:     "v0.1.0",
    downloadUrl: "",                 // 예: 구글드라이브/직접 호스팅 링크
    sizeBytes:   0,                  // 모르면 0
    dateISO:     "2026-01-01",
    notes:       "첫 배포 빌드입니다."
  }
};
/* ===================================================================== */

const $ = (id) => document.getElementById(id);

function fmtSize(bytes){
  if(!bytes) return "—";
  const mb = bytes / (1024*1024);
  return mb >= 1024 ? (mb/1024).toFixed(2)+" GB" : mb.toFixed(0)+" MB";
}
function fmtDate(iso){
  if(!iso) return "—";
  const d = new Date(iso);
  return d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0");
}

function fill(data){
  $("badgeText").textContent = "최신 버전 " + data.version;
  $("metaVer").textContent  = data.version;
  $("metaSize").textContent = fmtSize(data.sizeBytes);
  $("metaDate").textContent = fmtDate(data.dateISO);

  const btn = $("dlBtn");
  if(data.downloadUrl){
    btn.href = data.downloadUrl;
    btn.setAttribute("aria-disabled","false");
    $("dlBtnText").textContent = "지금 다운로드";
  } else {
    btn.setAttribute("aria-disabled","true");
    $("dlBtnText").textContent = "다운로드 준비 중";
  }
}

function showError(msg){
  $("badgeText").textContent = "버전 정보를 불러오지 못했습니다";
  $("dlBtnText").textContent = "다시 시도";
  $("dlSub").textContent = msg;
  $("dlBtn").href = "#";
  $("dlBtn").onclick = (e)=>{ e.preventDefault(); location.reload(); };
}

async function load(){
  if(!CONFIG.useGithub){
    fill({
      version: CONFIG.manual.version,
      sizeBytes: CONFIG.manual.sizeBytes,
      dateISO: CONFIG.manual.dateISO,
      notes: CONFIG.manual.notes,
      downloadUrl: CONFIG.manual.downloadUrl
    });
    return;
  }
  try{
    const url = `https://api.github.com/repos/${CONFIG.githubOwner}/${CONFIG.githubRepo}/releases/latest`;
    const res = await fetch(url, { headers:{ "Accept":"application/vnd.github+json" } });
    if(!res.ok){
      if(res.status === 404) throw new Error("아직 발행된 Release가 없습니다. GitHub에서 첫 Release를 발행해 주세요.");
      throw new Error("GitHub 응답 오류 ("+res.status+")");
    }
    const r = await res.json();
    // .exe 또는 .zip 우선, 없으면 첫 번째 첨부파일
    const asset = (r.assets||[]).find(a=>/\.(exe|zip|7z|rar)$/i.test(a.name)) || (r.assets||[])[0];
    fill({
      version: r.tag_name || r.name || "—",
      sizeBytes: asset ? asset.size : 0,
      dateISO: r.published_at,
      notes: r.body,
      downloadUrl: asset ? asset.browser_download_url : ""
    });
  }catch(err){
    showError(err.message || "알 수 없는 오류");
  }
}
load();
</script>
</body>
</html>
